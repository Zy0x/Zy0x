name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *'   # setiap hari jam 00:00 UTC
  workflow_dispatch:        # bisa trigger manual

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_STATS_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run stats generator
        env:
          GH_STATS_TOKEN: ${{ secrets.GH_STATS_TOKEN }}
        run: node .github/scripts/generate-stats.mjs

      - name: Commit & push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes" || (
            git add README.md &&
            git commit -m "chore: update GitHub stats [skip ci]" &&
            git push
          )